server {
    listen       8080 default_server;
    listen       [::]:8080 default_server;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Long-cache fingerprinted assets, never cache index.html.
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|webp|ico|map)$ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA history-API fallback: serve index.html for unknown routes so
    # client-side routing works on hard refresh.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Health probe for orchestrators (k8s/OpenShift readinessProbe).
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }
}
